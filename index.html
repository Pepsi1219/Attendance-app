<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>ระบบเช็คชื่อและกรอกคะแนน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260519c">
</head>
<body>

<!-- ============ TOP BAR ============ -->
<div class="top-bar" id="top-bar" style="display:none">
  <div class="user-info" id="user-info"></div>
  <div class="controls">
    <button class="btn-icon" onclick="showPage('page-dashboard'); loadDashboard();" title="Dashboard">📊</button>
    <button class="btn-icon" onclick="toggleLang()" id="lang-btn">TH</button>
    <button class="btn-icon" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <button onclick="handleLogout()" data-i18n="logout">ออกจากระบบ</button>
  </div>
</div>

<!-- ============ LOGIN ============ -->
<div class="container" id="page-login">
  <h2 data-i18n="login_title">เข้าสู่ระบบ</h2>
  <p class="subtitle" data-i18n="login_subtitle">ระบบเช็คชื่อและกรอกคะแนน</p>
  <div style="display:flex; justify-content:center; gap:8px; margin-bottom:18px;">
    <button class="btn-ghost" style="width:auto; padding:6px 14px; font-size:12px; margin:0;" onclick="toggleLang()" id="lang-btn-login">TH</button>
    <button class="btn-ghost" style="width:auto; padding:6px 14px; font-size:12px; margin:0;" onclick="toggleTheme()" id="theme-btn-login">🌙</button>
  </div>
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label data-i18n="email">อีเมล</label>
      <input type="email" id="login-email" required>
    </div>
    <div class="form-group">
      <label data-i18n="password">รหัสผ่าน</label>
      <input type="password" id="login-password" required>
    </div>
    <div class="error-text" id="login-error"></div>
    <button type="submit" id="login-submit" data-i18n="login_btn">เข้าสู่ระบบ</button>
  </form>
</div>

<!-- ============ MAIN APP ============ -->
<div id="page-app">
  <div class="container">
    <h2 data-i18n="app_title">ระบบเช็คชื่อ / กรอกคะแนน</h2>

    <div class="form-group">
      <label data-i18n="year">ปีการศึกษา</label>
      <input type="number" id="year">
    </div>
    <div class="form-group">
      <label data-i18n="level">ระดับชั้น</label>
      <select id="level">
        <option value="ป.5">ป.5</option>
        <option value="ป.6">ป.6</option>
      </select>
    </div>
    <div class="form-group">
      <label data-i18n="room">ห้อง</label>
      <select id="room"></select>
    </div>
    <div class="form-group">
      <label data-i18n="mode">โหมดการทำงาน</label>
      <select id="mode" onchange="onModeChange()">
        <option value="attendance" data-i18n="mode_attendance">เช็คชื่อเข้าเรียน</option>
        <option value="score" data-i18n="mode_score">กรอกคะแนน</option>
      </select>
    </div>
    <div class="form-group" id="group-date">
      <label data-i18n="date">วันที่</label>
      <input type="date" id="recordDate">
    </div>
    <div class="form-group" id="group-score" style="display:none">
      <label data-i18n="score_title">ชิ้นงาน</label>
      <select id="recordScoreType">
        <option value="pre"   data-i18n="score_pre">ก่อนกลางภาค</option>
        <option value="mid"   data-i18n="score_mid">กลางภาค</option>
        <option value="final" data-i18n="score_final">ปลายภาค</option>
      </select>
    </div>
    <button onclick="goToRecord()" data-i18n="next">ถัดไป</button>
    <button class="btn-ghost" id="btn-activity-list" onclick="onClickActivityList()" data-i18n="activity_list_btn">📋 รายชื่อนักเรียนในกิจกรรม</button>

    <div class="section-divider"></div>

    <div class="form-group">
      <label data-i18n="term">ภาคเรียน</label>
      <select id="term">
        <option value="1" data-i18n="term_1">ภาคต้น (พ.ค.-ก.ย.)</option>
        <option value="2" data-i18n="term_2">ภาคปลาย (พ.ย.-มี.ค.)</option>
        <option value="all" data-i18n="term_all">ทั้งปี</option>
      </select>
    </div>

    <button class="btn-secondary" id="btn-report" onclick="generateReport()" data-i18n="report_btn">📄 สร้างรายงาน PDF</button>
  </div>
</div>

<!-- ============ RECORD PAGE ============ -->
<div id="page-record">
  <div class="container">
    <div class="header-info" id="infoBox"></div>
    <div id="tableContainer"><div class="loading-text" data-i18n="loading">กำลังโหลดข้อมูล...</div></div>
    <button onclick="saveData()" id="saveBtn" data-i18n="save">บันทึกข้อมูล</button>
    <button class="btn-back" onclick="goToApp()" data-i18n="back">ย้อนกลับ</button>
  </div>
</div>

<!-- ============ ACTIVITY PAGE ============ -->
<div id="page-activity">
  <div class="container">
    <h2 data-i18n="activity_list">รายชื่อนักเรียนในกิจกรรม</h2>
    <p class="subtitle" id="activity-scope-text"></p>
    <div id="activityContainer"><div class="loading-text" data-i18n="loading">กำลังโหลดข้อมูล...</div></div>
    <button class="btn-back" onclick="goToApp()" data-i18n="back">ย้อนกลับ</button>
  </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div id="page-dashboard">
  <div class="container">
    <h2 data-i18n="dashboard">แดชบอร์ด</h2>

    <div class="dashboard-filters">
      <div>
        <label data-i18n="year">ปีการศึกษา</label>
        <input type="number" id="db-year">
      </div>
      <div>
        <label data-i18n="term">ภาคเรียน</label>
        <select id="db-term">
          <option value="all" data-i18n="term_all">ทั้งปี</option>
          <option value="1" data-i18n="term_1">ภาคต้น</option>
          <option value="2" data-i18n="term_2">ภาคปลาย</option>
        </select>
      </div>
      <div>
        <label data-i18n="level">ระดับชั้น</label>
        <select id="db-level">
          <option value="all" data-i18n="all">ทั้งหมด</option>
          <option value="ป.5">ป.5</option>
          <option value="ป.6">ป.6</option>
        </select>
      </div>
      <div>
        <label data-i18n="room">ห้อง</label>
        <select id="db-room"></select>
      </div>
    </div>
    <button onclick="loadDashboard()" data-i18n="db_refresh">🔄 อัปเดตข้อมูล</button>

    <div style="margin-top: 24px;">
      <div id="db-content">
        <div class="loading-text" data-i18n="loading">กำลังโหลดข้อมูล...</div>
      </div>
    </div>

    <button class="btn-back" onclick="goToApp()" data-i18n="back">ย้อนกลับ</button>
  </div>
</div>

<!-- ============ PDF REPORT HIDDEN CONTAINER ============ -->
<div id="report-container"></div>

<!-- ============ LIBRARIES ============ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="js/app.js?v=20260519c"></script>
</body>
</html>
